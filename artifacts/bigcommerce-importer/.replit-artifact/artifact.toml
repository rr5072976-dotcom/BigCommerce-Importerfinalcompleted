kind = "web"
  previewPath = "/"
  title = "BigCommerce Bulk Importer"
  version = "1.0.0"
  id = "artifacts/bigcommerce-importer"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 5173

  [services.development]
  run = "pnpm --filter @workspace/bigcommerce-importer run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/bigcommerce-importer", "run", "build" ]
  publicDir = "artifacts/bigcommerce-importer/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "5173"
  BASE_PATH = "/"
  